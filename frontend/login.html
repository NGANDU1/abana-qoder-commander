{% extends "_layout.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container py-5" style="max-width: 520px;">
  <div class="sw-card sw-kpi p-4">
    <h1 class="h4 mb-1">Login</h1>
    <p class="text-muted mb-4">Login is required to access the dashboard and live map.</p>
    <form method="post" action="{{ url_for('auth.login_post') }}">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" name="username" required autocomplete="username" placeholder="admin@123">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button class="btn btn-success w-100" type="submit"><i class="bi bi-box-arrow-in-right me-2"></i>Login</button>
    </form>
    <div class="text-center mt-3">
      <a class="small text-decoration-none" href="{{ url_for('auth.register') }}">Create an account</a>
    </div>
  </div>
</div>
{% endblock %}
