{% extends "shared/layout.html" %}
{% block title %}Update Level{% endblock %}
{% block content %}
<div class="container py-4" style="max-width: 720px;">
  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <h1 class="h4 mb-1">Update Fill Level</h1>
      <p class="text-muted mb-4">{{ b.bin_code }} — {{ b.location_name }}</p>

      <form method="post" action="{{ url_for('admin.bin_update_level_post', bin_id=b.id) }}">
        <div class="mb-3">
          <label class="form-label">Fill level (%)</label>
          <input class="form-control" name="fill_level" type="number" min="0" max="100" value="{{ b.fill_level }}" required>
          <div class="form-text">Status updates automatically: Empty / Moderate / Full / Overflow.</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-success" type="submit">Update</button>
          <a class="btn btn-outline-secondary" href="{{ url_for('public.bins') }}">Back</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
