{% extends "shared/layout.html" %}
{% block title %}Add User{% endblock %}
{% block content %}
<div class="container py-4" style="max-width: 640px;">
  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <h1 class="h4 mb-3">Create User</h1>
      <form method="post" action="{{ url_for('admin.user_create_post') }}">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" name="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email (optional)</label>
          <input class="form-control" name="email" type="email" required>
        </div>
        <div class="row g-2">
          <div class="col-md-6 mb-3">
            <label class="form-label">First name</label>
            <input class="form-control" name="first_name" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Surname</label>
            <input class="form-control" name="last_name" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Phone number</label>
          <input class="form-control" name="phone_number" placeholder="+44 ..." required>
        </div>
        <div class="mb-3">
          <label class="form-label">Role</label>
          <select class="form-select" name="role" id="roleSelect">
            <option value="user" selected>User</option>
            <option value="worker">Worker</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="mb-3" id="employeeIdWrap" style="display:none;">
          <label class="form-label">Employee ID</label>
          <input class="form-control" name="employee_id" placeholder="e.g. WRK-001">
          <div class="form-text">Required for Worker/Admin accounts.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-success" type="submit">Create</button>
          <a class="btn btn-outline-secondary" href="{{ url_for('admin.users') }}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  (function () {
    const roleSelect = document.getElementById('roleSelect');
    const employeeIdWrap = document.getElementById('employeeIdWrap');
    function sync() {
      const role = roleSelect.value;
      employeeIdWrap.style.display = (role === 'worker' || role === 'admin') ? '' : 'none';
    }
    roleSelect.addEventListener('change', sync);
    sync();
  })();
</script>
{% endblock %}
